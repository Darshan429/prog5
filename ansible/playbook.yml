- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: /var/snap/jenkins/5047/workspace/prog5/target/MymavenWebApp01.war
        dest: /opt/tomcat/webapps/MyMavenAnsibleApp01.war

    - name: Restart Tomcat
      shell: |
        /opt/tomcat/bin/shutdown.sh || true
        sleep 5
        /opt/tomcat/bin/startup.sh
